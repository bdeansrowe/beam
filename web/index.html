<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>wgpu + WASM</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0d0d; display: flex; justify-content: center; align-items: center; height: 100vh; }
    canvas { display: block; width: 800px; height: 600px; }
  </style>
</head>
<body>
  <!-- wgpu/winit will attach to this canvas -->
  <canvas id="canvas" width="800" height="600"></canvas>

  <script type="module">
    // wasm-pack outputs to ./pkg by default (see build script)
    import init from './pkg/wgpu_wasm_project.js';
    await init();
    // lib.rs #[wasm_bindgen(start)] is called automatically after init()
  </script>
</body>
</html>
